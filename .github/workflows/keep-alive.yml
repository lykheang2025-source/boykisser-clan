name: Keep Bot Alive 24/7

on:
  schedule:
    # Every 10 minutes, every day - keeps the Vercel function warm
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger too

jobs:
  ping:
    name: Ping Bot URL
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel deployment
        run: |
          curl -sS -o /dev/null -w "%{http_code}" \
            https://nuke-bot-three.vercel.app/health
          echo " - Health check"
      - name: Ping with delay (cold start prevention)
        run: |
          curl -sS -o /dev/null -w "%{http_code}" \
            https://nuke-bot-three.vercel.app/
          echo " - Main page"
